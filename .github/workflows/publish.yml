name: publish
on:
  release:
    types: [published]
permissions:
  contents: read
  id-token: write        # OIDC -- enables --provenance signing
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20          # match the version used for local scans
          registry-url: 'https://registry.npmjs.org'
      # isolated-vm (transitive via @n8n/expression-runtime) cannot build on the
      # runner's V8 headers. We never import isolated-vm at runtime — we only use
      # TypeScript types from n8n-workflow — so we skip native rebuild scripts.
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npx @n8n/scan-community-package n8n-nodes-shovels
        # scan MUST exit non-zero on findings -- this gate blocks the publish (FR-SC-4)
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
